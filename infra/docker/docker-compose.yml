services:
  postgres:
    image: postgres:16-alpine
    container_name: fixlytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fixlytics}
      POSTGRES_USER: ${POSTGRES_USER:-fixlytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fixlytics}
    ports:
      - "5432:5432"
    volumes:
      - fixlytics-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixlytics -d fixlytics"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: fixlytics-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - fixlytics-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    container_name: fixlytics-backend
    restart: unless-stopped
    env_file:
      - ../../apps/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-fixlytics}:${POSTGRES_PASSWORD:-fixlytics}@postgres:5432/${POSTGRES_DB:-fixlytics}
      REDIS_URL: redis://redis:6379
      USE_JOB_QUEUE: "true"
      SCRAPER_MODE: fixture
      FRONTEND_ORIGIN: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-before-prod}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES_DAYS: "7"
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    container_name: fixlytics-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      NEXT_INTERNAL_API_URL: http://backend:4000/api/v1
    ports:
      - "3000:3000"

volumes:
  fixlytics-postgres-data:
  fixlytics-redis-data:
